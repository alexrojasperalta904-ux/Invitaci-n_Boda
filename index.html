<script>
const sobre = document.getElementById("sobre");
const fondoGif = document.getElementById("fondo-gif");
const gifSalidaContenedor = document.getElementById("sobre");
const musica = document.getElementById("musica");

let abierto = false;

sobre.addEventListener("click", async () => {

    if (abierto) return;
    abierto = true;

    // Inicia la música cuando el usuario hace clic
    try {
        musica.volume = 1;
        musica.loop = true;
        musica.currentTime = 0;
        await musica.play();
    } catch (e) {
        console.log("No se pudo reproducir la música:", e);
    }

    // Abre el sobre
    sobre.classList.add("abierto");

    // Hace aparecer la carta
    setTimeout(() => {
        gifSalidaContenedor.classList.add("aparecer");
    }, 500);

    // Oculta el sobre y deja solo el GIF
    setTimeout(() => {
        sobre.classList.add("oculto");
        fondoGif.classList.add("mostrar");
    }, 2200);

});
</script>
